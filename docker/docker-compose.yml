services:
  # Optional: Keep local postgres for development/testing
  # Comment out or remove if only using external DB
  postgres:
    image: postgres:15-alpine
    container_name: metrics_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metrics_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metrics_network
    profiles:
      - local-db # Only start with: docker compose --profile local-db up

  # ============================================================
  # One-shot init container — creates the "keycloak" schema in
  # the cloud PostgreSQL if it doesn't already exist.
  # ============================================================
  keycloak-db-init:
    image: postgres:15-alpine
    container_name: metrics_keycloak_db_init
    command: >
      sh -c "PGPASSWORD=$$DB_PASSWORD psql
      -h $$DB_HOST -p $${DB_PORT:-5432} -U $$DB_USER -d $$DB_NAME
      -c 'CREATE SCHEMA IF NOT EXISTS keycloak;'"
    env_file:
      - .env
    networks:
      - metrics_network
    restart: "no"

  # ============================================================
  # Keycloak AAA — Identity Provider
  # Uses the same cloud PostgreSQL as the app, but in a separate
  # schema ("keycloak") to keep tables isolated from app tables.
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: metrics_keycloak
    command: start-dev --import-realm
    environment:
      # Keycloak admin credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Database connection — same cloud PostgreSQL, separate schema
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?sslmode=require
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      # Server config
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      # Health
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    networks:
      - metrics_network
    restart: unless-stopped

  # ... (prometheus, pushgateway, grafana stay the same) ...
  prometheus:
    image: prom/prometheus:latest
    container_name: metrics_prometheus
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    environment:
      - METRICS_SCRAPE_USER=${METRICS_SCRAPE_USER:-}
      - METRICS_SCRAPE_PASSWORD=${METRICS_SCRAPE_PASSWORD:-}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/prometheus-auth.yml.template:/etc/prometheus/prometheus-auth.yml.template
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - ./prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh
      - prometheus_data:/prometheus
    networks:
      - metrics_network
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:latest
    container_name: metrics_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - metrics_network

  # pushgateway:
  #   image: prom/pushgateway:latest
  #   container_name: metrics_pushgateway
  #   ports:
  #     - "9091:9091"
  #   volumes:
  #     - pushgateway_data:/pushgateway
  #   networks:
  #     - metrics_network
  #   command:
  #     - "--persistence.file=/pushgateway/data"
  #     - "--persistence.interval=5m"

  grafana:
    # Pin to 11.4.0 to avoid 11.5.x URL/orgId bugs; 11.6.x has auth proxy user sync issues
    image: grafana/grafana:11.4.0
    container_name: metrics_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Enable iframe embedding in frontend (via backend proxy)
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Disable anonymous access - Grafana only reachable via backend proxy with user isolation
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Auth proxy: backend adds X-WEBAUTH-USER, Grafana auto-logs in (no manual login)
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin
      # Serve from /grafana subpath for backend proxy
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Root URL must match how users access (via backend proxy at :3000)
      - GF_SERVER_ROOT_URL=${API_BASE_URL:-http://localhost:3000}/grafana
      - GF_SECURITY_COOKIE_SAMESITE=disabled
      # Disable unified alerting - stops AlertStatesDataLayer 404s on /api/prometheus/grafana/api/v1/rules
      - GF_UNIFIED_ALERTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - metrics_network
    depends_on:
      - prometheus
      - mimir

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: metrics_backend
    ports:
      - "3000:3000"
    env_file:
      - .env # Load environment variables from .env file
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      # Database connection - using env_file values
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL=${DB_SSL:-false}
      # Application config (for production set JWT_SECRET in .env to a strong random value)
      - JWT_SECRET=${JWT_SECRET:-dev-secret-do-not-use-in-production}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-false}
      - PUSHGATEWAY_URL=${PUSHGATEWAY_URL:-http://pushgateway:9091}
      - MIMIR_URL=${MIMIR_URL:-http://mimir:8080}
      - GRAFANA_MIMIR_DATASOURCE_URL=${GRAFANA_MIMIR_DATASOURCE_URL:-http://mimir:8080}
      - PROMETHEUS_INTERNAL_URL=${PROMETHEUS_INTERNAL_URL:-http://prometheus:9090}
      - GRAFANA_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GRAFANA_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      # Backend must use grafana:3000 from inside Docker (localhost = container itself)
      - GRAFANA_INTERNAL_URL=http://grafana:3000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3000}
      # Keycloak config (for backend token validation)
      - AUTH_PROVIDER=${AUTH_PROVIDER:-legacy}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - KEYCLOAK_ISSUER_URL=${KEYCLOAK_ISSUER_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-unified-visibility}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-uv-backend}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-uv-backend-dev-secret}
      - KEYCLOAK_FRONTEND_CLIENT_ID=${KEYCLOAK_FRONTEND_CLIENT_ID:-uv-frontend}
    volumes:
      - ../backend:/app
      # Dashboard JSON for tenant setup fallback (when Grafana org 1 provisioning is slow after volume reset)
      - ./grafana/dashboards:/app/dashboards:ro
      # Use image's node_modules (from npm ci) - anonymous volume can cache stale deps.
      # Removed /app/node_modules to ensure rebuilt image deps are used.
    # Note: Cannot add depends_on: grafana (cycle: backend->grafana->prometheus->backend).
    # Retry logic in grafanaTenant.service handles Grafana startup delay.
    # Remove postgres dependency if using external DB only
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    networks:
      - metrics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  prometheus_data:
  pushgateway_data:
  grafana_data: 

networks:
  metrics_network:
    driver: bridge
