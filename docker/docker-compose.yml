services:
  # Optional: Keep local postgres for development/testing
  # Comment out or remove if only using external DB
  postgres:
    image: postgres:15.8-alpine
    container_name: metrics_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metrics_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metrics_network
    profiles:
      - local-db # Only start with: docker compose --profile local-db up

  # MinIO - S3-compatible storage for Mimir (required for Mimir)
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: metrics_minio
    command: server --quiet /data
    environment:
      MINIO_ROOT_USER: mimir
      MINIO_ROOT_PASSWORD: supersecret
    volumes:
      - minio_data:/data
    networks:
      - metrics_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Initialize MinIO bucket(s) needed by Mimir.
  # Safe to re-run: creates bucket if missing.
  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    container_name: metrics_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - metrics_network
    entrypoint: >
      /bin/sh -lc "
      mc alias set local http://minio:9000 mimir supersecret &&
      mc mb -p local/mimir || true &&
      mc anonymous set none local/mimir || true
      "
    restart: "no"

  # Grafana Mimir - multi-tenant metrics backend with hard isolation (X-Scope-OrgID = user_id)
  mimir:
    image: grafana/mimir:2.14.0
    container_name: metrics_mimir
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    ports:
      - "9009:8080"
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - ./mimir/alertmanager-fallback-config.yaml:/etc/alertmanager-fallback-config.yaml:ro
      - mimir_data:/data
    networks:
      - metrics_network
    depends_on:
      - minio
      - minio-init

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: metrics_prometheus
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    environment:
      - METRICS_SCRAPE_USER=${METRICS_SCRAPE_USER:-}
      - METRICS_SCRAPE_PASSWORD=${METRICS_SCRAPE_PASSWORD:-}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/prometheus-auth.yml.template:/etc/prometheus/prometheus-auth.yml.template
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - ./prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh
      - prometheus_data:/prometheus
    networks:
      - metrics_network
    depends_on:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: metrics_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - metrics_network

  grafana:
    image: grafana/grafana:11.4.0
    container_name: metrics_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Enable iframe embedding in frontend (via backend proxy)
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Disable anonymous access - Grafana only reachable via backend proxy with user isolation
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # Auth proxy: backend adds X-WEBAUTH-USER, Grafana auto-logs in (no manual login)
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin
      # Serve from /grafana subpath for backend proxy
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Root URL must match how users access (via backend proxy at :3000)
      - GF_SERVER_ROOT_URL=${API_BASE_URL:-http://localhost:3000}/grafana
      - GF_SECURITY_COOKIE_SAMESITE=${GF_SECURITY_COOKIE_SAMESITE:-lax}
      - GF_UNIFIED_ALERTING_ENABLED=false
      - GF_SECURITY_CSRF_TRUSTED_ORIGINS=${GF_SECURITY_CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      - GF_SECURITY_CSRF_ADDITIONAL_HEADERS=X-WEBAUTH-USER
      - GF_SECURITY_COOKIE_SECURE=${GF_SECURITY_COOKIE_SECURE:-false}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - metrics_network
    depends_on:
      - prometheus
      - mimir

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: metrics_backend
    ports:
      - "3000:3000"
    env_file:
      - .env # Load environment variables from .env file
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      # Database connection - using env_file values
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL=${DB_SSL:-false}
      # Application config (for production set JWT_SECRET in .env to a strong random value)
      - JWT_SECRET=${JWT_SECRET:-dev-secret-do-not-use-in-production}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-true}
      - MIMIR_URL=${MIMIR_URL:-http://mimir:8080}
      - GRAFANA_MIMIR_DATASOURCE_URL=${GRAFANA_MIMIR_DATASOURCE_URL:-http://mimir:8080}
      - PROMETHEUS_INTERNAL_URL=${PROMETHEUS_INTERNAL_URL:-http://prometheus:9090}
      - GRAFANA_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GRAFANA_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      # Backend must use grafana:3000 from inside Docker (localhost = container itself)
      - GRAFANA_INTERNAL_URL=http://grafana:3000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3000}
      - METRICS_SCRAPE_USER=${METRICS_SCRAPE_USER:-}
      - METRICS_SCRAPE_PASSWORD=${METRICS_SCRAPE_PASSWORD:-}
      # Dashboard fallback path for tenant setup (resilient after grafana volume reset)
      - DASHBOARD_JSON_PATH=/app/dashboards/metrics-dashboard.json
    volumes:
      - ../backend:/app
      # Dashboard JSON for tenant setup fallback (when Grafana org 1 provisioning is slow after volume reset)
      - ./grafana/dashboards:/app/dashboards:ro
      # Use image's node_modules (from npm ci) - anonymous volume can cache stale deps.
      # Removed /app/node_modules to ensure rebuilt image deps are used.
    # Note: Cannot add depends_on: grafana (cycle: backend->grafana->prometheus->backend).
    # Retry logic in grafanaTenant.service handles Grafana startup delay.
    # Remove postgres dependency if using external DB only
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    networks:
      - metrics_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  minio_data:
  mimir_data:

networks:
  metrics_network:
    driver: bridge
    
