apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: vizme
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-lc"]
          args:
            - >
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
              mc mb -p local/mimir || true &&
              mc anonymous set none local/mimir || true
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: vizme-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vizme-secrets
                  key: MINIO_ROOT_PASSWORD