map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream backend_upstream {
  server backend:3000;
  keepalive 32;
}

upstream grafana_upstream {
  server grafana:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;

  # Useful for larger dashboard payloads
  client_max_body_size 20m;

  # Health endpoint for the reverse proxy itself
  location = /health/nginx {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # All API + health traffic goes to the backend
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_pass http://backend_upstream;
  }

  # Internal auth subrequest for Grafana embed session → emits X-WEBAUTH-* headers.
  location = /_grafana_auth {
    internal;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Original-URI $request_uri;
    proxy_pass http://backend_upstream/api/v1/grafana/_auth;
  }

  # Grafana reverse proxy (replaces backend's /grafana proxy middleware)
  location ^~ /grafana/ {
    auth_request /_grafana_auth;

    # Capture auth headers produced by backend and forward them to Grafana.
    auth_request_set $x_webauth_user  $upstream_http_x_webauth_user;
    auth_request_set $x_webauth_orgs  $upstream_http_x_webauth_orgs;
    auth_request_set $x_grafana_org   $upstream_http_x_grafana_org_id;
    auth_request_set $x_scope_orgid   $upstream_http_x_scope_orgid;
    auth_request_set $x_webauth_email $upstream_http_x_webauth_email;
    auth_request_set $x_webauth_name  $upstream_http_x_webauth_name;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /grafana;

    proxy_set_header X-WEBAUTH-USER $x_webauth_user;
    proxy_set_header X-WEBAUTH-ORGS $x_webauth_orgs;
    proxy_set_header X-Grafana-Org-Id $x_grafana_org;
    proxy_set_header X-Scope-OrgID $x_scope_orgid;
    proxy_set_header X-WEBAUTH-EMAIL $x_webauth_email;
    proxy_set_header X-WEBAUTH-NAME $x_webauth_name;

    # WebSocket support (Grafana Live)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_redirect off;
    proxy_buffering off;
    proxy_read_timeout 3600s;

    proxy_pass http://grafana_upstream;
  }
}

