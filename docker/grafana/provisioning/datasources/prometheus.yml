# Org 1 datasources. Per-user orgs get Mimir only (via grafanaTenant.service).
# Prometheus: infra metrics only (no tenant isolation). NOT for user dashboards.
apiVersion: 1

datasources:
  # Prometheus has ALL metrics - for infra only, never for user metrics. isDefault: false
  # so per-user orgs (when they get dashboard copied) won't accidentally use Prometheus.
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      timeInterval: "3s"
